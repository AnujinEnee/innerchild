        - generic [ref=e80]:
          - generic [ref=e81]:
            - heading "Key Takeaways" [level=3] [ref=e82]
            - list [ref=e84]:
              - listitem [ref=e85]: Friends often play roles such as planning activities, offering support, bringing laughter, and encouraging everyone to have fun.
              - listitem [ref=e86]: Knowing your friend role can help you strengthen your friendships and improve your connections.
              - listitem [ref=e87]: Understanding your type can boost your self-awareness and confidence.
          - paragraph [ref=e88]:
            - text: Have you ever wondered what kind of
            - link "friend" [ref=e89] [cursor=pointer]:
              - /url: https://www.verywellmind.com/the-types-of-friendship-7975881
            - text: you are in your circle? We all play different roles in our relationships with others and sometimes it's fun to think about how our friends see us.
          - paragraph [ref=e90]:
            - text: Understanding your role as a friend profoundly influences the dynamics of your friendships, says
            - link "Ashley Peña" [ref=e91] [cursor=pointer]:
              - /url: https://missionconnectionhealthcare.com/our-staff/
            - text: ", LCSW, National Executive Director of Outpatient Services at AMFM Healthcare."
          - paragraph [ref=e92]: That's why we've created this free quiz—take it to find out what kind of friend you are.
          - heading "The Friendship Quiz" [level=2] [ref=e93]
          - paragraph [ref=e94]: This quiz helps you identify what type of friend you are.
          - paragraph [ref=e95]: If multiple answers resonate, choose the one that reflects the most likely scenario.
          - iframe [ref=e97]:
            
          - heading "Who Is This Quiz For?" [level=2] [ref=e98]
          - paragraph [ref=e99]:
            - text: Ever wondered why your friends appreciate you? This quiz can help you discover your strengths as a friend. If you're reflecting on your relationships, it can help you understand your role in your friends' lives. Research shows that increased
            - link "self-aware" [ref=e100] [cursor=pointer]:
              - /url: https://www.verywellmind.com/what-is-self-awareness-2795023
            - text: can improve relationship quality.[1]
          - generic [ref=e101]:
            - text: “
            - generic [ref=e102]:
              - paragraph [ref=e104]: Understanding your role as a friend profoundly influences the dynamics of your friendships.”
              - generic [ref=e106]: — ASHLEY PEÑA, LCSW
          - heading "The Different Types of Friends" [level=2] [ref=e107]
          - paragraph [ref=e108]: "These are some of the friendship roles you might play:"
          - list [ref=e109]:
            - listitem [ref=e110]:
              - strong [ref=e111]: "The Planner:"
              - text: Planning events for a group with diverse personalities and interests can be challenging. Every group benefits from an organizer who can keep everything on track.
            - listitem [ref=e112]:
              - strong [ref=e113]: "The Supportive Listener:"
              - text: During tough times, a friend with
              - link "empathy" [ref=e114] [cursor=pointer]:
                - /url: https://www.verywellmind.com/how-to-be-more-empathetic-6455878
              - text: is invaluable. This friend helps navigate life's ups and downs and provides a shoulder to lean on, sometimes at the cost of their own comfort.
            - listitem [ref=e115]:
              - strong [ref=e116]: "The Comic Relief:"
              - text: This friend knows how to make everyone laugh. Their jokes and funny stories lighten the mood and bring joy, regardless of the circumstances.
            - listitem [ref=e117]:
              - strong [ref=e118]: "The Life of the Party:"
              - text: Sometimes, a friend who
              - link "energizes the group" [ref=e119] [cursor=pointer]:
                - /url: https://www.verywellmind.com/a-guide-to-mixing-friend-groups-11693587
              - text: is needed. This extrovert ensures everyone is having fun, whether out on the town or staying in.
          - generic [ref=e120]:
            - text: "Related:"
            - link "50 Deep Questions to Ask Your Friends" [ref=e121] [cursor=pointer]:
              - /url: https://www.verywellmind.com/deep-questions-to-ask-your-friends-8557231
          - heading "Why It’s Important to Know What Kind of Friend You Are" [level=2] [ref=e122]
          - paragraph [ref=e123]: "Knowing your type of friendship can be beneficial for:"
          - list [ref=e124]:
            - listitem [ref=e125]:
              - strong [ref=e126]: "Strengthening Friendships:"
              - text: Reflecting on your
              - link "strengths" [ref=e127] [cursor=pointer]:
                - /url: https://www.verywellmind.com/what-are-character-strengths-4843090
              - text: and weaknesses helps you improve connections with friends.
            - listitem [ref=e128]:
              - strong [ref=e129]: "Forming New Bonds:"
              - text: Understanding your personality and what you value in friendships can help you find like-minded individuals, as people with similar personalities often connect better.[2]
            - listitem [ref=e130]:
              - strong [ref=e131]: "Increasing Self-Awareness:"
              - text: Recognizing how you participate in friendships can reveal new aspects of your personality, benefiting many areas of your life.
            - listitem [ref=e132]:
              - strong [ref=e133]: "Boosting Confidence:"
              - text: Understanding the strengths you bring to friendships can increase your confidence, helping you recognize your value to others.
          - generic [ref=e134]:
            - text: “
            - generic [ref=e135]:
              - paragraph [ref=e137]: Friendship, like any relationship, requires mutual effort and understanding between people. Being aware of how you contribute strengthens the bond and fosters openness and connection.”
              - generic [ref=e139]: — ASHLEY PEÑA, LCSW
